name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Reject tags with leading 'v'
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  if [[ "$TAG" == v* ]]; then
                    echo "Obsidian requires tags without a 'v' prefix (got '$TAG'). Use '1.0.0', not 'v1.0.0'."
                    exit 1
                  fi

            - run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build

            - name: Package plugin zip
              run: |
                  mkdir -p sentilis
                  cp main.js manifest.json styles.css sentilis/
                  zip -r sentilis.zip sentilis

            - name: Verify manifest version matches tag
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
                  if [ "$TAG" != "$MANIFEST_VERSION" ]; then
                    echo "Tag $TAG does not match manifest.json version $MANIFEST_VERSION"
                    exit 1
                  fi

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  gh release create "$TAG" \
                    --title "$TAG" \
                    --generate-notes \
                    main.js manifest.json styles.css sentilis.zip
